<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Login | The Filth Factor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Custom styles for the login portal to maintain the "Vault" aesthetic */
        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a001a 0%, #050505 100%);
        }
        .login-box {
            background: rgba(10, 10, 10, 0.9);
            padding: 3rem;
            border: 1px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .login-box h2 {
            color: #00f2ff;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px #00f2ff;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: #ccc;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            outline: none;
        }
        .input-group input:focus {
            border-color: #00f2ff;
        }
        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: #ff00ff;
            color: #000;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }
        .auth-btn:hover {
            box-shadow: 0 0 20px #ff00ff;
            transform: scale(1.02);
        }
        .toggle-auth {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .toggle-auth a {
            color: #00f2ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h2>Board the Vessel</h2>
            <p style="margin-bottom: 2rem; font-size: 0.9rem;">Join the Sovereign Sensualist community. Absolute freedom. Zero cost.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label>MANIFEST IDENTITY (Email or Username)</label>
                    <input type="text" placeholder="Enter your identity..." required>
                </div>
                <div class="input-group">
                    <label>SECURITY KEY (Password)</label>
                    <input type="password" placeholder="Enter security key..." required>
                </div>
                
                <button type="submit" class="auth-btn">Authorize Access</button>
            </form>

            <div class="toggle-auth">
                New to the S.S. Seduction? <a href="#">Sign up for free</a>
            </div>
            
            <div style="margin-top: 2rem;">
                <a href="index.html" style="color: #666; font-size: 0.8rem; text-decoration: none;">← Return to the Promenade</a>
            </div>
        </div>
    </div>

</body>
</html>
